<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <title>オフライン — BEATRIP</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
          "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
        background: #fafafa;
        color: #18181b;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #09090b;
          color: #fafafa;
        }
      }
      .wrap {
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: block;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        margin: 0 0 12px;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 24px;
        font-size: 15px;
        line-height: 1.6;
        opacity: 0.75;
      }
      button {
        appearance: none;
        background: #10b981;
        color: #fff;
        border: 0;
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        min-height: 44px;
        min-width: 160px;
      }
      button:hover {
        background: #059669;
      }
      .hint {
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <img class="logo" src="/icon.svg" alt="BEATRIP" />
      <h1>オフラインです</h1>
      <p>インターネット接続が確認できません。<br />接続が復帰したら再読み込みしてください。</p>
      <button type="button" onclick="location.reload()">再読み込み</button>
      <div class="hint">BEATRIP — 旅行ディール集約</div>
    </main>
  </body>
</html>
